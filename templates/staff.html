<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Management - Shahi Mutton Khanawal</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-1:#0b0d10;
      --bg-2:#1a1410;
      --surface:rgba(255,255,255,0.06);
      --border:rgba(255,255,255,0.12);
      --text:#f9f6ef;
      --muted:#b9b1a7;
      --copper:#c8843a;
      --amber:#f4c76b;
      --ink:#16100d;
      --olive:#7fb069;
      --danger:#ef4444;
      --shadow:0 24px 50px rgba(0,0,0,0.45);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:'Manrope',sans-serif;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(200,132,58,0.25), transparent 60%),
        radial-gradient(900px 520px at 100% 10%, rgba(127,176,105,0.18), transparent 60%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      padding:26px;
      position:relative;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:-20% -10% auto -10%;
      height:260px;
      background:repeating-linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.03) 1px, transparent 1px, transparent 12px);
      opacity:0.6;
      pointer-events:none;
    }

    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    h1{
      margin:0;
      font-family:'Playfair Display',serif;
      font-size:34px;
      letter-spacing:0.4px;
    }

    .sub{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.6fr);
      gap:20px;
      margin-top:18px;
    }

    .panel{
      padding:20px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.08);
      background:
        linear-gradient(165deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)),
        radial-gradient(220px 140px at 90% 0%, rgba(244,199,107,0.08), transparent 70%);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .panel::after{
      content:"";
      position:absolute;
      right:-40px;
      top:-40px;
      width:160px;
      height:160px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(244,199,107,0.18), transparent 70%);
      pointer-events:none;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
      margin:14px 0 8px;
    }

    .stat{
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.12);
      background:linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    }

    .stat .label{ font-size:12px; color:var(--muted); }
    .stat .value{ font-size:20px; font-weight:800; margin-top:4px; }

    .form-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    label{ font-size:12px; color:var(--muted); display:block; margin-bottom:6px; }

    input, select{
      width:100%;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.16);
      background:rgba(11,8,6,0.6);
      color:var(--text);
      outline:none;
      font-size:14px;
    }

    input:focus, select:focus{
      border-color:rgba(244,199,107,0.65);
      box-shadow:0 0 0 3px rgba(244,199,107,0.15);
    }

    .btn{
      margin-top:12px;
      width:100%;
      border:none;
      border-radius:12px;
      padding:12px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      color:var(--ink);
      background:linear-gradient(180deg, var(--amber), var(--copper));
      box-shadow:0 14px 26px rgba(200,132,58,0.35);
    }

    .table{
      width:100%;
      border-collapse:collapse;
      margin-top:8px;
      font-size:14px;
    }

    .table th, .table td{
      text-align:left;
      padding:10px 8px;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .table th{
      font-size:12px;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#cbd5e1;
    }

    .tag{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
    }

    .status-toggle{
      cursor:pointer;
      font-weight:700;
      transition:filter 0.15s ease, transform 0.15s ease;
    }

    .status-toggle:hover{ transform:translateY(-1px); }

    .status-toggle[data-status="online"]{
      background:rgba(34,197,94,0.18);
      border-color:rgba(34,197,94,0.5);
      color:#bbf7d0;
    }

    .status-toggle[data-status="offline"]{
      background:rgba(239,68,68,0.12);
      border-color:rgba(239,68,68,0.4);
      color:#fecaca;
    }

    .delete-btn{
      border:none;
      background:rgba(239,68,68,0.12);
      color:#fecaca;
      padding:6px 10px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
    }

    .muted{ color:var(--muted); }

    @media (max-width: 980px){
      .grid{ grid-template-columns:1fr; }
      .stats{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Staff Management</h1>
      <div class="sub">Add staff, track salary and working days, manage team list.</div>
    </div>
    <button class="btn" style="width:auto;padding:10px 16px" onclick="location.href='/dashboard'">Back to Dashboard</button>
  </div>

  <div class="grid">
    <div class="panel">
      <h3 style="margin:0 0 6px">Add Staff</h3>
      <div class="muted" style="font-size:12px">Fill details and save. It will appear in the list instantly.</div>

      <div class="form-row">
        <div>
          <label>Name</label>
          <input id="staffName" placeholder="e.g. Rahul" />
        </div>
        <div>
          <label>Mobile</label>
          <input id="staffMobile" placeholder="e.g. 9876543210" />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Role</label>
          <input id="staffRole" placeholder="e.g. Waiter" />
        </div>
        <div>
          <label>Monthly Salary (₹)</label>
          <input id="staffMonthly" type="number" placeholder="e.g. 15000" />
        </div>
      </div>
      <!--

      <div class="form-row">
        <div>
          <label>Salary Month</label>
          <input id="staffMonth" type="month" />
        </div>
        <div>
          <label>Days Present</label>
          <input id="staffDays" type="number" placeholder="e.g. 26" />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Calculated Salary (₹)</label>
          <input id="staffSalary" type="number" placeholder="Auto calculated" readonly />
        </div>
        <div>
          <label> </label>
          <div class="tag">Salary auto = monthly / total days × present days</div>
        </div>
      </div>

      -->
      <button class="btn" id="saveStaff">Save Staff</button>
      <div id="formMsg" class="muted" style="margin-top:8px;font-size:12px"></div>
    </div>

    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:0">Staff List</h3>
        <div class="muted" style="font-size:12px">Total: <span id="staffCount">0</span></div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">Total Staff</div>
          <div class="value" id="statTotal">0</div>
        </div>
        <div class="stat">
          <div class="label">Total Salary (₹)</div>
          <div class="value" id="statSalary">0</div>
        </div>
      </div>

      <table class="table" id="staffTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Mobile</th>
            <th>Role</th>
            <th>Salary</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="emptyMsg" class="muted" style="margin-top:10px;display:none">No staff added yet.</div>
    </div>
  </div>

  <script>
    async function fetchStaff(){
      const res = await fetch('/api/staff');
      return await res.json();
    }

    function renderStats(list){
      const total = list.length;
      const totalSalary = list.reduce((s,i)=> s + Number(i.salary || 0), 0);
      document.getElementById('staffCount').textContent = total;
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statSalary').textContent = totalSalary.toLocaleString('en-IN');
    }

    function renderTable(list){
      const tbody = document.querySelector('#staffTable tbody');
      tbody.innerHTML = '';

      if(!list.length){
        document.getElementById('emptyMsg').style.display = 'block';
        return;
      }

      document.getElementById('emptyMsg').style.display = 'none';

      list.forEach(item=>{
        const tr = document.createElement('tr');
        const status = (item.status || 'offline').toLowerCase();
        tr.innerHTML = `
          <td>${item.name || '-'}</td>
          <td>${item.mobile || '-'}</td>
          <td><span class="tag">${item.role || '-'}</span></td>
          <td>₹ ${Number(item.salary || 0).toLocaleString('en-IN')}</td>
          <td>
            <button class="status-toggle tag" data-id="${item.id}" data-status="${status}">
              ${status === 'online' ? 'Online' : 'Offline'}
            </button>
          </td>
          <td><button class="delete-btn" data-id="${item.id}">Delete</button></td>
        `;
        tbody.appendChild(tr);
      });

      document.querySelectorAll('.status-toggle').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const id = btn.getAttribute('data-id');
          const current = btn.getAttribute('data-status') || 'offline';
          const next = current === 'online' ? 'offline' : 'online';
          const res = await fetch('/api/staff/' + id + '/status', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ status: next })
          });
          const json = await res.json();
          if(json && json.ok){
            btn.setAttribute('data-status', next);
            btn.textContent = next === 'online' ? 'Online' : 'Offline';
          }
        });
      });

      document.querySelectorAll('.delete-btn').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const id = btn.getAttribute('data-id');
          await fetch('/delete_staff/' + id, { method:'DELETE' });
          await loadStaff();
        });
      });
    }

    async function loadStaff(){
      const data = await fetchStaff();
      renderStats(data);
      renderTable(data);
    }

    document.getElementById('saveStaff').addEventListener('click', async ()=>{
      const name = document.getElementById('staffName').value.trim();
      const mobile = document.getElementById('staffMobile').value.trim();
      const role = document.getElementById('staffRole').value.trim();
      const monthly = document.getElementById('staffMonthly').value.trim();
      const salary = monthly;

      if(!name || !mobile || !role || !monthly || !salary){
        document.getElementById('formMsg').textContent = 'Please fill all required fields.';
        return;
      }

      document.getElementById('formMsg').textContent = 'Saving...';
      await fetch('/add_staff', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          name: name,
          mobile: mobile,
          role: role,
          salary: salary,
          days_worked: 0
        })
      });

      document.getElementById('formMsg').textContent = 'Saved.';
      document.getElementById('staffName').value = '';
      document.getElementById('staffMobile').value = '';
      document.getElementById('staffRole').value = '';
      document.getElementById('staffMonthly').value = '';

      setTimeout(()=>{ document.getElementById('formMsg').textContent = ''; }, 1200);
      await loadStaff();
    });

    loadStaff();
  </script>
</body>
</html>
